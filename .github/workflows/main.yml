name: Generate Space Shooter Game

on:
    schedule:
        - cron: "0 */6 * * *"
    workflow_dispatch:

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Generate Space Shooter Game
              uses: czl9707/gh-space-shooter@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
